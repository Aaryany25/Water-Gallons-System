<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#001f27",

                        "primary-fixed": "#d8e2ff",

                        "surface-tint": "#005ac4",
                        "on-secondary-fixed-variant": "#004e5f",
                        "surface-container": "#eeeef0",
                        "secondary-container": "#50d9fe",
                        "surface": "#f9f9fc",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#cde7ec",
                        "tertiary": "#486064",
                        "on-primary-fixed": "#001a42",
                        "outline": "#727786",
                        "outline-variant": "#c1c6d7",
                        "on-tertiary-fixed": "#061f23",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#61797d",
                        "on-surface": "#1a1c1e",
                        "tertiary-fixed-dim": "#b2cbd0",
                        "surface-container-low": "#f3f3f6",
                        "on-secondary-container": "#005c70",
                        "surface-container-highest": "#e2e2e5",

                        "background": "#f9f9fc",

                        "error-container": "#ffdad6",
                        "primary": "#0058bf",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#004396",
                        "surface-bright": "#f9f9fc",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#aec6ff",
                        "secondary-fixed-dim": "#4cd6fb",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#b3ebff",
                        "secondary": "#00677d",
                        "inverse-on-surface": "#f0f0f3",
                        "on-primary-container": "#fefcff",
                        "on-surface-variant": "#414755",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "2xl": "48px",
                        "md": "16px",
                        "lg": "24px",
                        "sm": "12px",
                        "margin-mobile": "20px",
                        "xl": "32px",
                        "base": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "manrope": ["Manrope", "sans-serif"],
                        "label-md": ["Manrope"],
                        "h1": ["Manrope"],
                        "h2": ["Manrope"],
                        "caption": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "body-md": ["Manrope"],
                        "h3": ["Manrope"]
                    },
                    "fontSize": {
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "h1": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "h2": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "caption": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "h3": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
                    }
                }
            }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 111, 239, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-blue-50/20 shadow-sm">
<div class="flex items-center justify-between px-5 h-16 w-full max-w-[1200px] mx-auto">
<button class="transition-all duration-200 active:scale-95 text-blue-600">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-manrope font-bold text-lg text-on-surface">Place Order</h1>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-fixed">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close up portrait of a smiling professional man in a bright modern office setting with soft daylight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAsgNgBsLW2NMzU5z_ZlJNsjpDxXENOt0sS1VG203ILe63g-yRkoAaL2n4VwhOBivgZN7q0zB0jV9na370vx0RdA6RcBcpwXZMv21thh_En0TgebyyPndu1d1HrSpfiWpTkNadOjk8uKlic33oDX5eSwAluuSPuSo4jgZfRDlgaMZiiT4E86D9HI-G2YSJ2nk3F27C5tnQm2-2uQsinlHVvtcbh7TedRlKOW7riFZIPC-YZdQMm8o8g2Kk4q1CM7v8lIo1sRnb7sPc"/>
</div>
</div>
</header>
<main class="pt-20 px-margin-mobile max-w-[600px] mx-auto space-y-lg">
<!-- Quantity Selection Section -->
<section class="space-y-sm">
<span class="font-label-md text-label-md text-on-surface-variant">Select Quantity</span>
<div class="glass-card rounded-xl p-lg flex items-center justify-between shadow-[0_4px_20px_rgba(0,119,255,0.06)]">
<div class="flex items-center gap-md">
<div class="w-16 h-16 bg-secondary-fixed/30 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="water_drop">water_drop</span>
</div>
<div>
<h3 class="font-h3 text-h3">20L Pure Spring</h3>
<p class="font-caption text-caption text-outline">Glacier Fresh Water</p>
</div>
</div>
<div class="flex items-center gap-md bg-surface-container rounded-full p-xs">
<button class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-primary transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<span class="font-h3 text-h3 px-sm">05</span>
<button class="w-10 h-10 rounded-full bg-primary text-white shadow-md flex items-center justify-center transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
</section>
<!-- Delivery Date & Time -->
<section class="space-y-sm">
<span class="font-label-md text-label-md text-on-surface-variant">Delivery Schedule</span>
<div class="glass-card rounded-xl p-md shadow-[0_4px_20px_rgba(0,119,255,0.06)]">
<!-- Date Picker Scroll -->
<div class="flex gap-sm overflow-x-auto pb-md scrollbar-hide">
<button class="flex-shrink-0 w-16 h-20 rounded-xl flex flex-col items-center justify-center gap-xs bg-primary text-white shadow-lg transition-transform active:scale-95">
<span class="font-caption text-caption opacity-80">Mon</span>
<span class="font-h3 text-h3">12</span>
</button>
<button class="flex-shrink-0 w-16 h-20 rounded-xl flex flex-col items-center justify-center gap-xs bg-surface-container-low text-on-surface-variant transition-transform active:scale-95">
<span class="font-caption text-caption">Tue</span>
<span class="font-h3 text-h3">13</span>
</button>
<button class="flex-shrink-0 w-16 h-20 rounded-xl flex flex-col items-center justify-center gap-xs bg-surface-container-low text-on-surface-variant transition-transform active:scale-95">
<span class="font-caption text-caption">Wed</span>
<span class="font-h3 text-h3">14</span>
</button>
<button class="flex-shrink-0 w-16 h-20 rounded-xl flex flex-col items-center justify-center gap-xs bg-surface-container-low text-on-surface-variant transition-transform active:scale-95">
<span class="font-caption text-caption">Thu</span>
<span class="font-h3 text-h3">15</span>
</button>
<button class="flex-shrink-0 w-16 h-20 rounded-xl flex flex-col items-center justify-center gap-xs bg-surface-container-low text-on-surface-variant transition-transform active:scale-95">
<span class="font-caption text-caption">Fri</span>
<span class="font-h3 text-h3">16</span>
</button>
</div>
<!-- Time Slots -->
<div class="grid grid-cols-2 gap-sm pt-sm border-t border-blue-50/20">
<button class="flex items-center gap-sm p-sm rounded-lg border-2 border-primary bg-primary-fixed/20 text-primary font-label-md text-sm transition-all">
<span class="material-symbols-outlined text-[18px]" data-icon="schedule">schedule</span>
                        09:00 - 12:00
                    </button>
<button class="flex items-center gap-sm p-sm rounded-lg border-2 border-transparent bg-surface-container-low text-outline font-label-md text-sm hover:border-outline-variant transition-all">
<span class="material-symbols-outlined text-[18px]" data-icon="schedule">schedule</span>
                        02:00 - 05:00
                    </button>
</div>
</div>
</section>
<!-- Delivery Address -->
<section class="space-y-sm">
<div class="flex justify-between items-center">
<span class="font-label-md text-label-md text-on-surface-variant">Delivery Address</span>
<button class="text-primary font-label-md text-sm flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]" data-icon="edit">edit</span>
                    Change
                </button>
</div>
<div class="glass-card rounded-xl p-md flex items-start gap-md shadow-[0_4px_20px_rgba(0,119,255,0.06)]">
<div class="w-12 h-12 rounded-full bg-secondary-fixed/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
</div>
<div class="flex-1">
<h3 class="font-h3 text-[16px] text-on-surface">Main Office Hub</h3>
<p class="font-body-md text-sm text-on-surface-variant">242 Azure Boulevard, Suite 400, Crystal Springs, CA 90210</p>
</div>
</div>
</section>
<!-- Order Summary Card -->
<section class="glass-card rounded-xl p-md bg-primary/5 border border-primary/10">
<h3 class="font-label-md text-label-md text-primary mb-md">Order Summary</h3>
<div class="space-y-xs">
<div class="flex justify-between font-body-md text-sm">
<span class="text-outline">5x 20L Water Bottles</span>
<span class="text-on-surface font-semibold">$45.00</span>
</div>
<div class="flex justify-between font-body-md text-sm">
<span class="text-outline">Delivery Fee</span>
<span class="text-on-surface font-semibold">$5.00</span>
</div>
<div class="h-px bg-primary/10 my-sm"></div>
<div class="flex justify-between font-h2 text-h3 text-primary">
<span>Total Amount</span>
<span>$50.00</span>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl border-t border-blue-50/10 p-margin-mobile z-50">
<button class="w-full bg-primary text-white py-lg rounded-xl font-h3 flex items-center justify-center gap-sm shadow-[0_8px_30px_rgba(0,88,191,0.3)] transition-all active:scale-95 hover:bg-primary-container">
            Place Order
            <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- BottomNavBar (Hidden on Placing Order Screen per Shell Logic for Transactional focus) -->
<!-- The prompt mentions this is a checkout/order process, so Shell is suppressed for priority on the Canvas -->
<!-- Quick Order FAB (Suppressed on Transactional Screens per Shell Logic) -->
</body></html>
